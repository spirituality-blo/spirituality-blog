<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | Syncr4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f3ff; padding: 2rem; }
    h1 { color: #6c63ff; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-weight: bold; margin-bottom: 0.3rem; }
    input, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
    textarea { height: 300px; font-family: monospace; }
    button { background: #6c63ff; color: white; border: none; padding: 0.75rem 2rem; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
    button:hover { background: #5a52d5; }
    .msg { margin-top: 1rem; padding: 1rem; border-radius: 6px; }
    .msg.success { background: #d4edda; color: #155724; }
    .msg.error { background: #f8d7da; color: #721c24; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌟 Syncr4 管理画面</h1>

    <div class="form-group">
      <label>管理者キー</label>
      <input type="password" id="adminKey" placeholder="管理者キーを入力">
    </div>

    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="title" placeholder="記事タイトル">
    </div>

    <div class="form-group">
      <label>スラッグ（URL用）</label>
      <input type="text" id="slug" placeholder="article-slug">
    </div>

    <div class="form-group">
      <label>説明文</label>
      <input type="text" id="description" placeholder="記事の説明文（meta description）">
    </div>

    <div class="form-group">
      <label>本文（HTML可）</label>
      <textarea id="content" placeholder="記事本文を入力..."></textarea>
    </div>

    <button onclick="submitArticle()">記事を投稿</button>
    <div id="msg"></div>
  </div>

  <script>
    async function submitArticle() {
      const adminKey = document.getElementById('adminKey').value;
      const title = document.getElementById('title').value;
      const slug = document.getElementById('slug').value;
      const description = document.getElementById('description').value;
      const content = document.getElementById('content').value;
      const msg = document.getElementById('msg');

      if (!adminKey || !title || !slug || !content) {
        msg.className = 'msg error';
        msg.textContent = '管理者キー・タイトル・スラッグ・本文は必須です。';
        return;
      }

      try {
        const res = await fetch('/api/articles', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Key': adminKey
          },
          body: JSON.stringify({ title, slug, description, content })
        });

        const data = await res.json();

        if (res.ok) {
          msg.className = 'msg success';
          msg.textContent = '✅ 記事を投稿しました！';
          document.getElementById('title').value = '';
          document.getElementById('slug').value = '';
          document.getElementById('description').value = '';
          document.getElementById('content').value = '';
        } else {
          msg.className = 'msg error';
          msg.textContent = `❌ エラー: ${data.error}`;
        }
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = `❌ 通信エラー: ${err.message}`;
      }
    }
  </script>
</body>
</html>
